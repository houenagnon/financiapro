[tool.ruff]
line-length = 100
target-version = "py312"
exclude = ["*/migrations/*", ".venv"]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle
    "F",   # pyflakes
    "I",   # isort
    "B",   # bugbear
    "DJ",  # flake8-django
    "UP",  # pyupgrade
]

[tool.ruff.lint.isort]
known-first-party = ["apps", "config"]
